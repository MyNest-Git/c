<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>c</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #fff;
      color: #111;
    }
    .wrap {
      text-align: center;
      padding: 24px;
    }
    .number {
      font-size: 3rem;
      font-weight: 700;
      line-height: 1.1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="result" class="number"></div>
  </div>

  <script>
    function render() {
      const raw = window.location.hash.slice(1).trim();
      const year = Number.parseInt(raw, 10);
      const now = new Date().getFullYear();
      const result = document.getElementById("result");

      if (!Number.isInteger(year) || year < 0 || year > now) {
        result.textContent = "";
        return;
      }

      result.textContent = now - year;
    }

    window.addEventListener("hashchange", render);
    window.addEventListener("load", render);
  </script>
</body>
</html>
